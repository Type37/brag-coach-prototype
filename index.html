<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brag Coach Prototype</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#f66116;--green:#5ed47b;--blue:#2d6bf1;--red:#eb3b26;
  --drop-bg:#f4f4f4;
}
body{font-family:'IBM Plex Mono',monospace;background:#111;overflow:hidden;height:100vh}

/* SWITCHER */
.sw{position:fixed;top:0;left:0;right:0;z-index:9999;background:#0a0a0a;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 16px;height:36px;gap:4px}
.sw .lb{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#444;margin-right:10px}
.sw button{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 12px;border:1px solid #333;background:transparent;color:#777;cursor:pointer;transition:all .15s}
.sw button:hover{color:#ccc;border-color:#555}
.sw button.on{background:var(--orange);border-color:var(--orange);color:#fff}

/* MAIN */
.main{margin-top:36px;height:calc(100vh - 36px);position:relative;overflow:hidden}

/* PAGE BG */
.pg-bg{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;overflow-y:auto;transition:opacity .4s;background:#111}
.pg-bg img{width:100%;display:block}
.pg-bg.hidden{opacity:0;pointer-events:none}

/* === TOP BAR: pill + site icons === */
.top-bar{
  position:absolute;top:8px;left:0;right:0;z-index:100;
  padding:6px 20px;
  display:flex;align-items:center;justify-content:flex-end;
  gap:0;
}

/* MERGE WRAPPER (pill + search icon fuse on open) */
.merge-wrap{
  display:flex;align-items:center;
  border-radius:50px;
  position:relative;
  transition:border-radius .3s, background .3s, border-color .3s, box-shadow .3s, width .35s cubic-bezier(.4,0,.2,1);
  border:1.5px solid transparent;
  margin-right:4px;
}
.merge-wrap.open{
  border-color:var(--green);
  background:#111;
  border-radius:14px 14px 0 0;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
/* When merged, the search icon is visually inside */
.merge-wrap.open .site-icon#searchIcon{
  background:transparent;
  border-left:1px solid #2a2a2a;
  border-radius:0 13px 0 0;
  margin:0;
  padding:8px 14px;
}
.merge-wrap.open .site-icon#searchIcon svg circle,
.merge-wrap.open .site-icon#searchIcon svg line{stroke:var(--green)}
.merge-wrap.open .site-icon#searchIcon .si-lbl{color:var(--green)}

/* SEARCH PILL (left of icons) */
.search-pill{
  border:1.5px solid rgba(255,255,255,.3);border-radius:50px;
  padding:15px 26px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
  color:rgba(255,255,255,.65);background:rgba(0,0,0,.35);backdrop-filter:blur(8px);
  cursor:pointer;position:relative;
  transition:background .3s, border-color .3s, color .3s, border-radius .3s, box-shadow .3s, padding .3s;
  flex:1 1 auto;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.search-pill:hover{border-color:rgba(255,255,255,.5)}
.search-pill.open{
  border-color:transparent;background:transparent;color:#ccc;
  border-radius:14px 0 0 0;
  box-shadow:none;
  backdrop-filter:none;
}
.search-pill .ico{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5;display:none}

/* Pill text cycling */
#pillTxt{transition:opacity .3s}

/* BRAG label inside pill */
.brag-label{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:var(--green);color:#111;
  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  padding:5px 10px;border-radius:2px;cursor:pointer;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.brag-label.show{opacity:1;pointer-events:all}
.brag-label:hover{background:#49a860}

/* === SITE ICON NAV === */
.site-icon{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 14px;
  cursor:pointer;background:none;border:none;
  transition:opacity .15s;
}
.site-icon:hover{opacity:.7}
.site-icon svg{width:26px;height:26px}
.site-icon .si-lbl{
  font-family:'Source Sans 3',sans-serif;
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  color:rgba(255,255,255,.8);
  white-space:nowrap;
}
/* Active search icon */
.site-icon{position:relative}
.si-dot{
  position:absolute;top:2px;right:8px;width:7px;height:7px;
  border-radius:50%;background:var(--green);
  display:none;z-index:1;
  animation:pdot 2s ease-in-out infinite;
}
.si-dot.show{display:block}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.site-icon.active svg circle,
.site-icon.active svg line{stroke:var(--green)}
.site-icon.active .si-lbl{color:var(--green)}

/* JIGGLE */
@keyframes jiggle{
  0%{transform:rotate(0)}15%{transform:rotate(-1.5deg)}30%{transform:rotate(1.5deg)}
  45%{transform:rotate(-1deg)}60%{transform:rotate(1deg)}75%{transform:rotate(-.5deg)}100%{transform:rotate(0)}
}
.search-pill.jiggle{animation:jiggle .5s ease}

/* CHARACTER PEEK */
.char-peek{
  position:absolute;right:60px;bottom:-2px;width:36px;height:28px;
  overflow:hidden;cursor:pointer;z-index:101;display:none;
}
.char-peek.visible{display:block;animation:peekIn .3s ease both}
.char-peek:hover{transform:translateY(-4px)}
.char-peek svg{width:36px;height:36px;position:absolute;top:0;left:0}
@keyframes peekIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.char-peek.visible.bob{animation:bob 2s ease-in-out infinite}

/* OVERLAY */
.ov{position:absolute;top:0;left:0;right:0;bottom:0;z-index:90;background:rgba(0,0,0,0);pointer-events:none;transition:background .4s}
.ov.on{background:rgba(0,0,0,.55);pointer-events:all}

/* CHAT DROPDOWN */
.drop{
  position:absolute;z-index:200;
  background:#111;border:1.5px solid var(--green);border-top:none;
  border-radius:0 0 14px 14px;
  height:calc(100vh - 140px);
  transform:scaleY(0);transform-origin:top;
  opacity:0;pointer-events:none;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .25s;
  display:flex;flex-direction:column;
  box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.drop.open{transform:scaleY(1);opacity:1;pointer-events:all}

.ch-topbar{padding:6px 14px;display:flex;justify-content:flex-end;flex-shrink:0}
.ch-x{background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:2px 8px}
.ch-x:hover{color:#fff}

/* Welcome state */
.welcome{text-align:center;padding:28px 20px 16px;flex-shrink:0;animation:fu .4s ease both;position:relative;overflow:hidden}
.welcome .w-script{font-family:'IBM Plex Mono',monospace;font-size:22px;font-style:italic;color:#fff;margin-bottom:2px;letter-spacing:.02em}
.welcome .w-ready{font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.2em;color:#ccc;margin-bottom:2px}
.welcome .w-name{font-family:'IBM Plex Mono',monospace;font-size:52px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:#fff;line-height:1}
.welcome .w-weare{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:#ccc;margin-top:16px;margin-bottom:8px}
.welcome .w-traits{display:flex;flex-direction:column;align-items:center;gap:2px}
.welcome .w-trait{font-family:'IBM Plex Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:.15em;color:#fff;padding:2px 0}
.welcome .w-bottom{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.25em;color:#555;margin-top:16px}
.welcome .w-char{position:absolute;top:20px;right:16px;width:60px;height:60px}
.welcome .w-char svg{width:100%;height:100%}
.welcome.collapsed{display:none}

.ch-mini{padding:8px 14px;border-bottom:1px solid #222;display:none;align-items:center;gap:8px;flex-shrink:0}
.ch-mini.show{display:flex}
.ch-mini .mini-av{width:34px;height:34px;flex-shrink:0}
.ch-mini .mini-nm{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff}
.ch-mini .mini-st{font-size:11px;color:var(--green)}

.m-row{display:flex;gap:10px;align-items:flex-start;animation:fu .3s ease both}
.m-row .m-av{width:42px;height:42px;flex-shrink:0;margin-top:2px}
.m-row .m-av svg{width:100%;height:100%}

.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;min-height:0}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.ctx{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#555;padding-bottom:4px}
.ctx b{color:var(--orange);font-weight:400}

.prs{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.pr{
  font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 16px;border-radius:2px;
  background:#1a1a1a;cursor:pointer;transition:all .15s;text-align:left;line-height:1.3;
  animation:fu .3s ease both;
}
.pr.o{border:1.5px solid var(--orange);color:var(--orange)}.pr.o:hover{background:rgba(246,97,22,.12)}
.pr.g{border:1.5px solid var(--green);color:var(--green)}.pr.g:hover{background:rgba(94,212,123,.12)}
.pr.b{border:1.5px solid var(--blue);color:var(--blue)}.pr.b:hover{background:rgba(45,107,241,.12)}
.pr.r{border:1.5px solid var(--red);color:var(--red)}.pr.r:hover{background:rgba(235,59,38,.12)}
.pr.n{border:1.5px solid #666;color:#ccc}.pr.n:hover{background:#222}
.pr:nth-child(1){animation-delay:.05s}.pr:nth-child(2){animation-delay:.1s}
.pr:nth-child(3){animation-delay:.15s}.pr:nth-child(4){animation-delay:.2s}

.m{max-width:82%;padding:12px 16px;border-radius:2px;font-size:14px;line-height:1.55;white-space:pre-wrap;animation:fu .3s ease both;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.m.bot{background:#1a1a1a;color:#fff;align-self:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.m.usr{background:#333;color:#fff;align-self:flex-end}
.m.cap{border-left:3px solid var(--orange);background:#1a1510}
.m .tags{color:var(--blue);font-size:11px;margin-top:5px}
.m.ld{color:var(--orange);font-style:italic;animation:fu .3s ease both,pl 1.2s ease-in-out infinite}
.m.df{border-left:3px solid var(--green);background:#0a1a0e}
.m.er{border-left:3px solid var(--red);background:#1a0a0a}

.m.dm{background:#2a2a2a;border-radius:2px;padding:14px 18px;color:#fff;max-width:75%}
.m.dm .dm-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#666;margin-bottom:6px}
.m.dm .dm-body{font-size:15px;line-height:1.5}

.m.tik{background:#111;color:#f0f0f0;border-radius:12px;border:1px solid #333;padding:0;overflow:hidden}
.m.tik .tik-head{background:#222;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--red)}
.m.tik .tik-body{padding:12px 14px;font-size:13px;line-height:1.55;white-space:pre-wrap}
.m.tik .tik-caption{padding:8px 14px 12px;font-style:italic;font-size:12px;color:#aaa;border-top:1px solid #333}

.cb-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.cb-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:#222;border-radius:2px;border:1px solid #333;transition:border-color .15s}
.cb-item:hover{border-color:#555}
.cb-item .cb-text{flex:1;font-size:14px;line-height:1.4;color:#fff}
.cb-item .cb-cp{font-size:11px;padding:5px 12px;border:1px solid #555;background:#1a1a1a;color:#ccc;cursor:pointer;border-radius:2px;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:'IBM Plex Mono',monospace}
.cb-item .cb-cp:hover{border-color:#999;color:#fff}
.cb-item .cb-cp.done{border-color:var(--green);color:var(--green)}

.acts{display:flex;gap:6px;margin-top:8px;padding-top:7px;border-top:1px solid #333;position:relative}
.ab{font-size:11px;padding:4px 12px;border:1px solid #555;background:#1a1a1a;color:#ccc;cursor:pointer;border-radius:2px;transition:all .15s;font-family:'IBM Plex Mono',monospace}
.ab:hover{border-color:#999;color:#fff}
.ab.cp{border-color:var(--green);color:var(--green)}

.inp-area{padding:12px 18px 18px;border-top:1px solid #222;display:flex;gap:8px;flex-shrink:0}
.inp{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:2px;padding:12px 14px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none}
.inp:focus{border-color:var(--green);outline:2px solid var(--green);outline-offset:-2px}
.inp::placeholder{color:#555}
.snd{background:var(--green);border:none;border-radius:2px;padding:12px 18px;color:#111;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;transition:background .15s}
.snd:hover{background:#49a860}
.snd:active{transform:scale(.96)}

@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.4}}

/* === MOBILE BOTTOM SHEET === */
.mob-sheet{
  display:none;
  position:absolute;bottom:0;left:0;right:0;z-index:300;
  background:#111;
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.4,0,.15,1);
  flex-direction:column;
  height:85vh;
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
.mob-sheet.open{transform:translateY(0)}

.mob-handle{padding:10px 0 4px;display:flex;justify-content:center;cursor:pointer;flex-shrink:0}
.mob-bar{width:36px;height:4px;border-radius:2px;background:#333}

/* Tabs */
.mob-tabs{
  display:flex;padding:4px 16px 0;gap:0;border-bottom:1px solid #222;flex-shrink:0;
}
.mob-tab{
  flex:1;
  padding:12px 8px 10px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;
  text-transform:uppercase;letter-spacing:.08em;
  color:#666;background:none;border:none;
  border-bottom:2px solid transparent;
  cursor:pointer;transition:all .2s;
  position:relative;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.mob-tab:hover{color:#999}
.mob-tab.active{color:#fff;border-bottom-color:var(--green)}
.mob-tab-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  display:none;
}
.mob-tab-dot.show{display:inline-block;animation:pdot 2s ease-in-out infinite}

/* Panels */
.mob-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.mob-panel.hidden{display:none}

/* Search tab */
.mob-search-inner{padding:20px 18px;display:flex;flex-direction:column;gap:14px}
.mob-search-label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;
  letter-spacing:.15em;color:#666;
}
.mob-search-input{
  width:100%;background:#1a1a1a;border:1.5px solid #333;border-radius:3px;
  padding:14px 16px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;
}
.mob-search-input:focus{border-color:#fff}
.mob-search-input::placeholder{color:#555}
.mob-search-btn{
  align-self:flex-start;
  background:#fff;color:#111;border:none;
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  padding:12px 24px;border-radius:3px;cursor:pointer;
  transition:background .15s;
  display:flex;align-items:center;
}
.mob-search-btn:hover{background:#ddd}
.mob-search-btn:active{transform:scale(.97)}

.mob-search-quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.mob-sq-label{
  width:100%;font-family:'IBM Plex Mono',monospace;font-size:9px;
  text-transform:uppercase;letter-spacing:.15em;color:#555;margin-bottom:0;
}
.mob-sq{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  padding:8px 14px;border:1px solid #333;background:#1a1a1a;color:#ccc;
  border-radius:50px;cursor:pointer;transition:all .15s;
}
.mob-sq:hover{border-color:#666;color:#fff}

/* Brag tab */
.mob-brag-welcome{text-align:center;padding:20px 16px 12px;flex-shrink:0}
.mob-brag-welcome.collapsed{display:none}
.mob-brag-mini{padding:8px 16px;border-bottom:1px solid #222;display:none;align-items:center;gap:8px;flex-shrink:0}
.mob-brag-mini.show{display:flex}
.mob-msgs{padding:12px 16px}
.mob-inp-area{padding:10px 16px 16px}

/* Search results mock */
.mob-results{padding:16px 18px;flex:1;overflow-y:auto}
.mob-result{
  padding:14px 0;border-bottom:1px solid #222;
  animation:fu .3s ease both;
}
.mob-result:first-child{animation-delay:.05s}
.mob-result:nth-child(2){animation-delay:.1s}
.mob-result:nth-child(3){animation-delay:.15s}
.mob-result .mr-title{font-family:'Source Sans 3',sans-serif;font-size:16px;font-weight:600;color:var(--blue);margin-bottom:2px}
.mob-result .mr-url{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#555;margin-bottom:4px}
.mob-result .mr-desc{font-family:'Source Sans 3',sans-serif;font-size:13px;color:#999;line-height:1.4}

/* Responsive: mobile layout */
@media(max-width:768px){
  .search-pill,.char-peek{display:none!important}
  .merge-wrap{border:none!important;background:none!important;box-shadow:none!important;width:auto!important}
  .top-bar{justify-content:flex-end;padding:6px 12px;gap:0}
  .mob-sheet{display:flex}
}
/* Force mobile via toggle */
.force-mobile .search-pill,
.force-mobile .char-peek{display:none!important}
.force-mobile .merge-wrap{border:none!important;background:none!important;box-shadow:none!important;width:auto!important}
.force-mobile .top-bar{justify-content:flex-end;padding:6px 12px;gap:0}
.force-mobile .mob-sheet{display:flex}

/* Mobile frame (when forced) */
.force-mobile .main{
  max-width:390px;
  margin-left:auto;margin-right:auto;
  border-left:2px solid #333;
  border-right:2px solid #333;
  border-radius:0 0 20px 20px;
  overflow:hidden;
}

</style>
</head>
<body>

<div class="sw">
  <span class="lb">Page</span>
  <button class="on" onclick="go('home',this)">Homepage</button>
  <button onclick="go('events',this)">Events</button>
  <button onclick="go('downtown',this)">Downtown</button>
  <button onclick="go('mabels',this)">Mabel's BBQ</button>
  <button onclick="go('music',this)">Music</button>
  <span style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <button id="devDesk" class="on" onclick="setDevice('desktop')" style="font-size:10px">Desktop</button>
    <button id="devMob" onclick="setDevice('mobile')" style="font-size:10px">Mobile</button>
    <span style="width:1px;height:16px;background:#333"></span>
    <input type="checkbox" id="peekToggle" onchange="togglePeek()" style="margin:0;cursor:pointer">
    <label for="peekToggle" style="font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#666;cursor:pointer;white-space:nowrap">Character Peek</label>
  </span>
</div>

<div class="main">
  <div class="pg-bg" id="bg-home"></div>
  <div class="pg-bg hidden" id="bg-events"></div>
  <div class="pg-bg hidden" id="bg-downtown"></div>
  <div class="pg-bg hidden" id="bg-mabels"></div>
  <div class="pg-bg hidden" id="bg-music"></div>

  <!-- TOP BAR: pill on left, site icons on right -->
  <div class="top-bar">
    <div class="merge-wrap" id="mergeWrap">
    <div class="search-pill" id="pill" onclick="openC()">
      <span id="pillTxt">SEARCH OR CHAT WITH OUR ASSISTANT</span>
      <span class="ico" id="pillIco">⌕</span>
      <span class="brag-label" id="bragLabel" onclick="event.stopPropagation();triggerBrag()">BRAG</span>
      <div class="char-peek" id="charPeek" onclick="event.stopPropagation();openC()">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="56" fill="#111" stroke="#f66116" stroke-width="2"/>
          <circle cx="60" cy="40" r="18" stroke="#f66116" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
          <path d="M36 34 Q60 24 84 34" stroke="#f66116" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
          <text x="60" y="46" text-anchor="middle" font-family="IBM Plex Mono" font-size="20" font-weight="700" fill="#f66116">?</text>

const R={
"Hype me up about Cleveland":"Cleveland\u2019s food scene is built like the city itself: tough, creative, and allergic to being boring.\n\nStart Downtown where chefs are putting new-school twists on old-school comfort, then go chase the classics like corned beef and the legendary Polish Boy.\n\nGot a sweet tooth? Go hunt down locally made ice cream, Hong Kong street waffles, or beer-infused donuts at Brewnuts.\n\nAnd if you want to drink your way through the city with purpose, grab the Brewery Passport and start collecting bragging rights, one craft pour at a time.",
"Write me an Instagram caption":"Golden hour over The Land and the skyline\u2019s doing what it does: showing off like it earned it, because it did.\n\nCleveland doesn\u2019t pose. Cleveland puts in work, then lets the sunset handle the flex.\n\nNow post it loud, tag it proud, and make somebody outside the 216 ask questions.\n\n#ThisIsCleveland #TheLand #ClevelandRocks",
"Give me a comeback for haters":"Say it with your chest. Cleveland doesn\u2019t need hype. Cleveland produces receipts.\n\n\"Talk all you want. Cleveland keeps building while you\u2019re still tweeting.\"\n\"Cleveland\u2019s an underdog city. We don\u2019t whine, we win.\"\n\"You ever actually been, or you just recycling jokes from 2009?\"\n\"We don\u2019t \u2018try to be cool.\u2019 We just are. Quietly, stubbornly, permanently.\"\n\"If Cleveland\u2019s so bad, why do people never shut up about it?\"",
"What\u2019s happening this weekend?":"That\u2019s a little outside my lane. I\u2019m your Cleveland brag coach; I\u2019m here for trash talk, captions, and comebacks. Hit up the events page, find something good, and come back to me. I\u2019ll make whatever you pick sound incredible.",
"Write a caption for tonight\u2019s event":"\"Cleveland on a weeknight hits harder than your city on a Saturday. Don\u2019t @ me.\"\n\n#CLEnightlife #ThisIsCleveland #TheLandForLivingItUp",
"Roast someone who says CLE has nothing going on":"Ohio \"boring\" is a skill issue, not a fact.\n\n\"If Ohio\u2019s boring, why do you keep talking about it?\"\n\"Boring people get bored. Ohio stays busy.\"\n\"You\u2019re calling it boring from the comfort of the internet. Bold.\"\n\"Ohio raised grit, builders, and chaos in the best way. You wouldn\u2019t last a weekend.\"\n\"Come visit, or keep reviewing places you\u2019ve never experienced.\"",
"Hype up the Guardians home opener":"OPENING DAY IN CLEVELAND. The city where baseball matters so much we renamed our whole team for some giant Art Deco statues on a bridge. That\u2019s commitment. That\u2019s love. That\u2019s The Land.\n\n\"Progressive Field therapy session. I\u2019m healing loudly.\"\n\"Nine innings of commitment. I\u2019ve seen Browns fans with less.\"\n\"Guardians baseball: built on grit, finished with noise.\"\n\"Some people watch history. I buy a ticket.\"",
"Tell me something fun this weekend":"I\u2019m your brag coach, not your event planner. But go check out the events calendar and come back to me. I\u2019ll make whatever you pick sound incredible.",
"Caption for my E. 4th Street pic":"\"E. 4th Street: where the restaurants have James Beard Awards and the vibes have no expiration date.\"\n\nOr: \"Every block\u2019s a story, every stop\u2019s a \u2018one more round.\u2019 E. 4th understood the assignment.\"\n\n#E4thStreet #CLEeats #DowntownCleveland",
"Comeback for \"downtown is dead\"":"\"Downtown is dead\"? Playhouse Square is the largest performing arts center outside of New York City. E. 4th is packed every weekend. The Flats are back.\n\n\"Good. Less traffic for the people who get it.\"",
"Best brag about Playhouse Square":"Playhouse Square is the largest performing arts center outside of New York City. Not second largest. THE largest outside NYC.\n\nWe\u2019ve got drag queens sashaying across stages and rock legends riffing. Your take is just undercooked.",
"Where should I eat downtown?":"I\u2019m a brag coach, not a waiter. But Cleveland eats loud. Chase the classics: corned beef, the legendary Polish Boy. Drink your way through the city with the Brewery Passport.\n\nNow go eat something and bring me back a caption to write.",
"Instagram caption for this brisket":"\"Michael Symon put Bertman\u2019s ballpark mustard in the BBQ sauce and called it Cleveland-style. This is what happens when a city refuses to play by the rules. \ud83d\udd25\"\n\n#MabelsBBQ #ClevelandBBQ #E4thStreet #MichaelSymon",
"Why is Cleveland BBQ better than Texas?":"I\u2019m not here to dunk on other cities, rookie.\n\nBut Cleveland BBQ has its own lane. Bertman\u2019s mustard, Eastern European spices, fruitwood smoke. That\u2019s not copying anyone. That\u2019s IMMIGRANTS who know what FLAVOR is.\n\n\"Cleveland doesn\u2019t just make BBQ. It makes BBQ that could only come from Cleveland.\"",
"DM to send my friend about this place":"Here\u2019s a DM you can copy paste:\n\n\"Yo. Stop acting like Cleveland is optional. Pull up for a weekend and I\u2019ll prove it. We\u2019re talking lakefront views, real neighborhoods, food that hits and the kind of underdog energy that makes everything feel earned. If you still don\u2019t like it after 48 hours, I\u2019ll let you talk your trash. Deal.\"",
"What else should I try downtown?":"I\u2019m the brag coach, not Yelp. But if you\u2019re at Mabel\u2019s and don\u2019t walk over to Mitchell\u2019s Ice Cream after, you\u2019re making a mistake. Grab the Brewery Passport too.\n\nNow go and come back with a photo I can caption.",
"Caption for my Rock Hall visit":"\"History on the walls, future in the speakers. Rock Hall, Cleveland.\"\n\nPunchier: \"Making a legendary moment at the Rock & Roll Hall of Fame. Where music history meets right now.\"\n\n#RockOn #ClevelandRocks #RockHall",
"Roast someone who says CLE has no music scene":"\"No culture\" is a lazy take.\n\n\"Cleveland has so much public art people stop mid-walk like, \u2018Yo, what is THAT?\u2019 That\u2019s culture.\"\n\"We\u2019ve got drag queens sashaying across stages and rock legends riffing. Your take is just undercooked.\"\n\"If Cleveland had \u2018no culture,\u2019 nobody would be this pressed about it.\"",
"Brag about the Cleveland Orchestra":"Our city is made up of more than 100 ethnicities. \"Cleveland culture\" is a whole mixtape of communities, food, languages and traditions on the same block.\n\nAnd the Cleveland Orchestra? Top five on the PLANET. Not the country. THE PLANET. Up there with Vienna and Berlin.\n\nDrop that fact and watch the jokes stop.",
"TikTok idea for a concert tonight":"Film yourself walking in, pan to the stage, then do the \"what I expected vs what I got\" trend but both sides are just Cleveland being incredible.\n\nCaption: \"They said Cleveland has no nightlife. The nightlife:\"\n\n#ClevelandVibes #ClevelandNights",
};

const DF="That\u2019s outside my lane. I\u2019m your Cleveland brag coach: trash talk, captions, and comebacks. Try one of these:";
const LD=["Cooking up something good...","Sharpening the trash talk...","Consulting the Guardians...","Checking with the bridge..."];
const DW=["weather","crime","lebron","politics","directions","population","time zone"];

let cur='home';
let chatStarted=false;
let cycleIdx=0;
let cycleTimer=null;

const MINI_SVG='<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="60" r="56" stroke="#333" stroke-width="1" fill="#1a1a1a"/><circle cx="60" cy="40" r="18" stroke="#f66116" stroke-width="2" stroke-dasharray="4 3" fill="none"/><path d="M36 34 Q60 24 84 34" stroke="#f66116" stroke-width="2" stroke-dasharray="4 3" fill="none"/><path d="M28 100 Q28 72 42 62 Q60 54 78 62 Q92 72 92 100" stroke="#f66116" stroke-width="2" stroke-dasharray="4 3" fill="none"/><text x="60" y="46" text-anchor="middle" font-family="IBM Plex Mono" font-size="20" font-weight="700" fill="#f66116">?</text></svg>';

function go(p,btn){
  cur=p;
  document.querySelectorAll('.sw button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.pg-bg').forEach(el=>el.classList.add('hidden'));
  document.getElementById('bg-'+p).classList.remove('hidden');
  render();
  closeC();
  closeMob();
}

function render(){
  const c=CFG[cur];
  cycleIdx=0;
  document.getElementById('pillTxt').textContent=c.cycle[0];
  document.getElementById('bragLabel').classList.toggle('show',c.brag);
  document.getElementById('pillIco').style.display=c.brag?'none':'';
  document.getElementById('siDot').classList.toggle('show',c.brag);
  startCycling();
}

function startCycling(){
  if(cycleTimer)clearInterval(cycleTimer);
  const c=CFG[cur];
  if(!c.cycle||c.cycle.length<2)return;
  cycleTimer=setInterval(()=>{
    cycleIdx=(cycleIdx+1)%c.cycle.length;
    const txt=document.getElementById('pillTxt');
    txt.style.opacity='0';
    setTimeout(()=>{
      txt.textContent=c.cycle[cycleIdx];
      txt.style.opacity='1';
      if(c.brag){
        const isBragText=c.cycle[cycleIdx].includes('BRAG')||c.cycle[cycleIdx].includes('TELL')||c.cycle[cycleIdx].includes('SAY');
        document.getElementById('bragLabel').classList.toggle('show',isBragText);
        document.getElementById('pillIco').style.display=isBragText?'none':'';
      }
    },300);
  },3500);
}

function positionDrop(){
  const wrap=document.getElementById('mergeWrap');
  const drop=document.getElementById('drop');
  const rect=wrap.getBoundingClientRect();
  const main=document.querySelector('.main').getBoundingClientRect();
  drop.style.left=(rect.left - main.left)+'px';
  drop.style.width=rect.width+'px';
  drop.style.top=(rect.bottom - main.top)+'px';
}

function openC(){
  if(cycleTimer)clearInterval(cycleTimer);
  hidePeek();
  if(peekTimer)clearTimeout(peekTimer);
  document.getElementById('pill').classList.add('open');
  document.getElementById('mergeWrap').classList.add('open');
  document.getElementById('mergeWrap').style.width=openWidth+'px';
  document.getElementById('searchIcon').classList.add('active');
  // Position after a frame so width has applied
  requestAnimationFrame(()=>{positionDrop()});
  // Reposition after transition finishes too
  setTimeout(positionDrop,360);
  document.getElementById('drop').classList.add('open');
  document.getElementById('ov').classList.add('on');
  document.getElementById('bragLabel').classList.remove('show');
  document.getElementById('pillIco').style.display='none';
  chatStarted=false;
  initChat();
}

function closeC(){
  document.getElementById('pill').classList.remove('open');
  document.getElementById('mergeWrap').classList.remove('open');
  document.getElementById('mergeWrap').style.width=closedWidth+'px';
  document.getElementById('searchIcon').classList.remove('active');
  document.getElementById('drop').classList.remove('open');
  document.getElementById('ov').classList.remove('on');
  render();
  peekEnabled=document.getElementById('peekToggle').checked;
  if(peekEnabled)setTimeout(()=>startPeekCycle(),2000);
}

function initChat(){
  const m=document.getElementById('msgs'),c=CFG[cur];
  m.innerHTML='';
  document.getElementById('welcome').classList.remove('collapsed');
  document.getElementById('miniHeader').classList.remove('show');
  m.innerHTML+=`<div class="ctx">${c.ctx}</div>`;
  let h='<div class="prs">';
  c.prompts.forEach(p=>{h+=`<button class="pr ${p.c}" onclick="tap(this.textContent)">${p.t}</button>`});
  h+='</div>';
  m.innerHTML+=h;
}

function collapseWelcome(){
  if(chatStarted)return;
  chatStarted=true;
  document.getElementById('welcome').classList.add('collapsed');
  document.getElementById('miniHeader').classList.add('show');
}

function botMsg(html,cls){
  return `<div class="m-row"><div class="m-av">${MINI_SVG}</div><div class="m bot ${cls||''}">${html}</div></div>`;
}

function tap(t){
  const m=document.getElementById('msgs');
  collapseWelcome();
  const b=m.querySelector('.prs');if(b)b.style.display='none';
  m.innerHTML+=`<div class="m usr">${t}</div>`;
  if(t.toLowerCase()==='error'||t.toLowerCase().includes('test error')){
    setTimeout(()=>{
      m.innerHTML+=`<div class="m-row"><div class="m-av">${MINI_SVG}</div><div><div class="m bot err">Hold on, even hype men need a second sometimes. Bad connection. Try that again?</div></div></div>`;
      m.scrollTop=m.scrollHeight;
    },800);
    m.scrollTop=m.scrollHeight;return;
  }
  if(DW.some(w=>t.toLowerCase().includes(w))){
    setTimeout(()=>{m.innerHTML+=`<div class="m-row"><div class="m-av">${MINI_SVG}</div><div><div class="m bot df">${DF}</div></div></div>`;showPr();m.scrollTop=m.scrollHeight},600);
    m.scrollTop=m.scrollHeight;return;
  }
  const lt=LD[Math.floor(Math.random()*LD.length)];
  const lid='l'+Date.now();
  m.innerHTML+=`<div class="m-row" id="${lid}"><div class="m-av">${MINI_SVG}</div><div><div class="m bot ld">${lt}</div></div></div>`;
  m.scrollTop=m.scrollHeight;
  setTimeout(()=>{
    const el=document.getElementById(lid);if(!el)return;
    const r=R[t]||"Cleveland\u2019s got more going on than your city has excuses. Ask me something specific and I\u2019ll really get going.";
    const tl=t.toLowerCase();
    const fmt=detectFormat(tl,r);
    let inner;
    if(fmt==='dm'){
      const dmText=r.replace(/^.*copy paste.*?:\n\n/i,'').replace(/^"|"$/g,'');
      inner=`<div><div class="m bot dm"><div class="dm-label">\u2709 Ready to paste</div><div class="dm-body">${dmText}</div>${acts()}</div></div>`;
    } else if(fmt==='tiktok'){
      const parts=r.split(/\n\n/);
      const concept=parts[0]||'';
      const caption=parts.find(p=>p.startsWith('Caption:'))||'';
      const tags=parts.find(p=>p.startsWith('#'))||'';
      inner=`<div><div class="m bot tik"><div class="tik-head"><span>\ud83c\udfac</span> TIKTOK CONCEPT</div><div class="tik-body">${concept}</div>${caption?`<div class="tik-caption">${caption}</div>`:''}${tags?`<div class="tik-caption" style="color:var(--blue)">${tags}</div>`:''}<div class="acts" style="padding:8px 14px;border-top:1px solid #333"><button class="ab" onclick="cp(this)">\ud83d\udccb Copy</button><button class="ab" onclick="alert('Share sheet would open here')">\u2197 Share</button></div></div></div>`;
    } else if(fmt==='comeback'){
      const lines=r.split('\n');let intro='';let items=[];
      lines.forEach(l=>{const tr2=l.trim();if(tr2.startsWith('"')&&tr2.endsWith('"')){items.push(tr2.slice(1,-1))}else if(tr2.length>0){intro+=tr2+' '}});
      let cbH=`<div><div class="m bot">${intro.trim()}<div class="cb-list">`;
      items.forEach(item=>{cbH+=`<div class="cb-item"><div class="cb-text">\u201c${item}\u201d</div><button class="cb-cp" onclick="cpItem(this,\`${item.replace(/`/g,'\\`')}\`)">Copy</button></div>`});
      cbH+=`</div><div class="acts"><button class="ab" onclick="alert('Share sheet would open here')">\u2197 Share all</button></div></div></div>`;
      inner=cbH;
    } else if(fmt==='caption'){
      const pts=r.split(/\n\n(?=#)/);
      inner=`<div><div class="m bot cap">${pts[0]}${pts[1]?`<div class="tags">${pts[1]}</div>`:''}${acts()}</div></div>`;
    } else {
      inner=`<div><div class="m bot">${r}${acts()}</div></div>`;
    }
    el.outerHTML=`<div class="m-row"><div class="m-av">${MINI_SVG}</div>${inner}</div>`;
    showFu(t);
    m.scrollTop=m.scrollHeight;
  },1400);
}

function detectFormat(tl,r){
  if(tl.includes('dm')||tl.includes('send my friend'))return 'dm';
  if(tl.includes('tiktok'))return 'tiktok';
  if((tl.includes('comeback')||tl.includes('roast')||tl.includes('hater')||tl.includes('trash talk'))&&r.includes('"'))return 'comeback';
  if((tl.includes('caption')||tl.includes('instagram'))&&r.includes('#'))return 'caption';
  if(r.includes('#')&&(tl.includes('caption')||tl.includes('post')||tl.includes('write me')))return 'caption';
  return 'default';
}

function cpItem(btn,text){
  navigator.clipboard.writeText(text).then(()=>{btn.classList.add('done');btn.textContent='\u2713';setTimeout(()=>{btn.classList.remove('done');btn.textContent='Copy'},2000)});
}

function acts(){
  return '<div class="acts"><button class="ab" onclick="smartShare(this)">'+(/Mobi|Android/i.test(navigator.userAgent)?'\u2197 Share':'\ud83d\udccb Copy')+'</button></div>';
}

function smartShare(btn){
  const msgEl=btn.closest('.m');
  const text=msgEl.childNodes[0]?msgEl.childNodes[0].textContent:'';
  if(navigator.share&&/Mobi|Android/i.test(navigator.userAgent)){
    navigator.share({text:text}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      btn.classList.add('cp');btn.textContent='\u2713 Copied!';
      setTimeout(()=>{btn.classList.remove('cp');btn.textContent='\ud83d\udccb Copy'},2000);
    });
  }
}

function showPr(){
  const m=document.getElementById('msgs'),c=CFG[cur];
  let h='<div class="prs">';
  c.prompts.forEach(p=>{h+=`<button class="pr ${p.c}" onclick="tap(this.textContent)">${p.t}</button>`});
  h+='</div>';m.innerHTML+=h;
}

function showFu(orig){
  const m=document.getElementById('msgs'),c=CFG[cur];
  const fu=c.prompts.filter(p=>p.t!==orig).slice(0,2);
  if(!fu.length)return;
  let h='<div class="prs">';
  fu.forEach(p=>{h+=`<button class="pr ${p.c}" onclick="tap(this.textContent)">${p.t}</button>`});
  h+='</div>';m.innerHTML+=h;
}

function send(){const i=document.getElementById('inp'),t=i.value.trim();if(!t)return;i.value='';tap(t)}

function cp(btn){
  const t=btn.closest('.m').childNodes[0].textContent;
  navigator.clipboard.writeText(t).then(()=>{btn.classList.add('cp');btn.textContent='\u2713 Copied!';setTimeout(()=>{btn.classList.remove('cp');btn.textContent='\ud83d\udccb Copy'},2000)});
}

function triggerJiggle(){
  const pill=document.getElementById('pill');
  pill.classList.add('jiggle');
  pill.addEventListener('animationend',()=>pill.classList.remove('jiggle'),{once:true});
}

let peekTimer=null;
let peekEnabled=false;

function showPeek(){
  const peek=document.getElementById('charPeek');
  if(!peek||chatStarted||!peekEnabled)return;
  peek.style.display='block';peek.classList.add('visible');
  setTimeout(()=>peek.classList.add('bob'),300);
}
function hidePeek(){
  const peek=document.getElementById('charPeek');
  if(!peek)return;peek.classList.remove('visible','bob');peek.style.display='none';
}
function startPeekCycle(){
  if(peekTimer)clearTimeout(peekTimer);if(!peekEnabled)return;
  peekTimer=setTimeout(()=>{
    if(!chatStarted&&peekEnabled)showPeek();
    setTimeout(()=>{hidePeek();if(peekEnabled)startPeekCycle()},4000);
  },5000);
}
function stopPeekCycle(){if(peekTimer)clearTimeout(peekTimer);peekTimer=null;hidePeek()}
function togglePeek(){
  peekEnabled=document.getElementById('peekToggle').checked;
  if(peekEnabled)startPeekCycle();else stopPeekCycle();
}

function triggerBrag(){
  triggerJiggle();
  if(document.getElementById('peekToggle').checked)showPeek();
  setTimeout(()=>openC(),700);
}

let baseWidth=0;
let closedWidth=0;
let openWidth=0;

function measureAndSize(){
  if(isMob())return;
  const wrap=document.getElementById('mergeWrap');
  // Remove any set width to measure natural
  wrap.style.width='';
  wrap.style.transition='none';
  baseWidth=wrap.offsetWidth;
  closedWidth=Math.round(baseWidth*1.25);
  openWidth=Math.round(closedWidth*1.15);
  wrap.style.width=closedWidth+'px';
  // Re-enable transition next frame
  requestAnimationFrame(()=>{wrap.style.transition=''});
}

render();
// Measure after fonts load
if(document.fonts&&document.fonts.ready){
  document.fonts.ready.then(()=>measureAndSize());
} else {
  setTimeout(measureAndSize,200);
}
window.addEventListener('resize',()=>{
  if(window.innerWidth>768) measureAndSize();
  if(document.getElementById('drop').classList.contains('open')){
    document.getElementById('mergeWrap').style.width=openWidth+'px';
    positionDrop();
  }
});

/* === MOBILE === */
let forceMobile=false;
function isMob(){return forceMobile||window.innerWidth<=768}

function setDevice(mode){
  forceMobile=(mode==='mobile');
  document.body.classList.toggle('force-mobile',forceMobile);
  document.getElementById('devDesk').classList.toggle('on',!forceMobile);
  document.getElementById('devMob').classList.toggle('on',forceMobile);
  // Close everything when switching
  closeC();
  closeMob();
  if(!forceMobile) measureAndSize();
}

let mobStarted=false;

// Override search icon click for mobile
document.getElementById('searchIcon').onclick=function(){
  if(isMob()) openMob();
  else openC();
};

function openMob(){
  document.getElementById('ov').classList.add('on');
  document.getElementById('mobSheet').classList.add('open');
  // Default to search tab, but if brag page, open brag tab
  const c=CFG[cur];
  if(c.brag){switchTab('brag')} else {switchTab('search')}
  document.getElementById('mobDot').classList.toggle('show',c.brag);
}

function closeMob(){
  document.getElementById('ov').classList.remove('on');
  document.getElementById('mobSheet').classList.remove('open');
}

// Close overlay should also close mobile sheet
const origOvClick=document.getElementById('ov').onclick;
document.getElementById('ov').onclick=function(){
  if(isMob())closeMob(); else closeC();
};

function switchTab(tab){
  document.getElementById('tabSearch').classList.toggle('active',tab==='search');
  document.getElementById('tabBrag').classList.toggle('active',tab==='brag');
  document.getElementById('panelSearch').classList.toggle('hidden',tab!=='search');
  document.getElementById('panelBrag').classList.toggle('hidden',tab!=='brag');
  if(tab==='brag'&&!mobStarted){initMobChat()}
  if(tab==='search'){
    setTimeout(()=>document.getElementById('mobSearchInput').focus(),100);
  }
}

function initMobChat(){
  const m=document.getElementById('mobMsgs'),c=CFG[cur];
  m.innerHTML='';
  mobStarted=false;
  document.getElementById('mobWelcome').classList.remove('collapsed');
  document.getElementById('mobMini').classList.remove('show');

function mobCollapseWelcome(){
  if(mobStarted)return;
  mobStarted=true;
  document.getElementById('mobWelcome').classList.add('collapsed');
  document.getElementById('mobMini').classList.add('show');
}

function mobTap(t){
  const m=document.getElementById('mobMsgs');
  mobCollapseWelcome();
  const b=m.querySelector('.prs');if(b)b.style.display='none';
  m.innerHTML+=`<div class="m usr">${t}</div>`;
  if(DW.some(w=>t.toLowerCase().includes(w))){
    setTimeout(()=>{m.innerHTML+=`<div class="m-row"><div class="m-av">${MINI_SVG}</div><div><div class="m bot df">${DF}</div></div></div>`;mobShowPr();m.scrollTop=m.scrollHeight},600);

  }

    const el=document.getElementById(lid);if(!el)return;

    const tl=t.toLowerCase();
    const fmt=detectFormat(tl,r);
    let inner;
    if(fmt==='dm'){
      const dmText=r.replace(/^.*copy paste.*?:\n\n/i,'').replace(/^"|"$/g,'');
      inner=`<div><div class="m bot dm"><div class="dm-label">\u2709 Ready to paste</div><div class="dm-body">${dmText}</div>${acts()}</div></div>`;
    } else if(fmt==='tiktok'){
      const parts=r.split(/\n\n/);
      const concept=parts[0]||'';
      const caption=parts.find(p=>p.startsWith('Caption:'))||'';
      const tags=parts.find(p=>p.startsWith('#'))||'';
      inner=`<div><div class="m bot tik"><div class="tik-head"><span>\ud83c\udfac</span> TIKTOK CONCEPT</div><div class="tik-body">${concept}</div>${caption?`<div class="tik-caption">${caption}</div>`:''}${tags?`<div class="tik-caption" style="color:var(--blue)">${tags}</div>`:''}<div class="acts" style="padding:8px 14px;border-top:1px solid #333"><button class="ab" onclick="cp(this)">\ud83d\udccb Copy</button></div></div></div>`;
    } else if(fmt==='comeback'){
      const lines=r.split('\n');let intro='';let items=[];
      lines.forEach(l=>{const tr=l.trim();if(tr.startsWith('"')&&tr.endsWith('"')){items.push(tr.slice(1,-1))}else if(tr.length>0){intro+=tr+' '}});
      let cbH=`<div><div class="m bot">${intro.trim()}<div class="cb-list">`;
      items.forEach(item=>{cbH+=`<div class="cb-item"><div class="cb-text">\u201c${item}\u201d</div><button class="cb-cp" onclick="cpItem(this,\`${item.replace(/`/g,'\\`')}\`)">Copy</button></div>`});
      cbH+=`</div></div></div>`;
      inner=cbH;
    } else if(fmt==='caption'){
      const pts=r.split(/\n\n(?=#)/);
      inner=`<div><div class="m bot cap">${pts[0]}${pts[1]?`<div class="tags">${pts[1]}</div>`:''}${acts()}</div></div>`;
    } else {
      inner=`<div><div class="m bot">${r}${acts()}</div></div>`;
    }
    el.outerHTML=`<div class="m-row"><div class="m-av">${MINI_SVG}</div>${inner}</div>`;
    mobShowFu(t);
    m.scrollTop=m.scrollHeight;
  },1400);
}

function mobSend(){
